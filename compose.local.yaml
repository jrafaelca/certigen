services:
  certigen:
    build:
      context: .
      target: development
    container_name: certigen
    env_file: .env
    ports:
      - "${FORWARD_PORT:-3000}:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ./data:/data
    command: ["sh", "-c", "pnpm install --frozen-lockfile --prefer-offline && exec pnpm dev"]

volumes:
  node_modules:
