services:
  certigen:
    build:
      context: .
      target: development
    ports:
      - "${FORWARD_PORT:-3000}:3000"
    environment:
      PORT: ${PORT:-3000}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      DATA_DIR: ${DATA_DIR:-/data}
      APP_NAME: ${APP_NAME:-Certigen}
      APP_VERSION: ${APP_VERSION:-1.0.0}
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ./data:/data
    command: ["sh", "-c", "pnpm install --frozen-lockfile --prefer-offline && exec pnpm dev"]

volumes:
  node_modules:
